<!DOCTYPE html>
<html>
<head>
    <title>Məhsulu Düzenle</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Məhsulu Düzenle</h2>
        <form method="POST">
            <label>Ad:</label>
            <input type="text" name="name" value="{{ product[1] }}" required>
            
            <label>Qiymət:</label>
            <input type="number" step="0.01" name="price" value="{{ product[2] }}" required>
            
            <label>Kateqoriya:</label>
            <select name="category">
                <option value="yükseltme" {% if product[3] == 'yükseltme' %}selected{% endif %}>Yükseltme</option>
                <option value="genişletme" {% if product[3] == 'genişletme' %}selected{% endif %}>Genişletme</option>
                <option value="ürün" {% if product[3] == 'ürün' %}selected{% endif %}>Ürün</option>
                <option value="depo" {% if product[3] == 'depo' %}selected{% endif %}>Depo</option>
                <option value="altınlar" {% if product[3] == 'altınlar' %}selected{% endif %}>Altınlar</option>
            </select>
            
            <button type="submit" style="background: #2980b9; color: white; border: none; padding: 10px; width: 100%; cursor: pointer;">Yadda Saxla</button>
        </form>
        <br>
        <a href="{{ url_for('admin') }}" style="display: block; text-align: center; color: #7f8c8d;">Ləğv et və qayıt</a>
    </div>
</body>
</html>
